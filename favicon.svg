<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#09090E"/>
  <!-- Ambient haze -->
  <circle cx="16" cy="16" r="14" fill="rgba(221,211,190,0.06)"/>
  <!-- Outer body gradient approximated as layered circles -->
  <circle cx="16" cy="13" r="12" fill="rgba(221,211,190,0.12)"/>
  <circle cx="16" cy="12" r="9" fill="rgba(221,211,190,0.16)"/>
  <circle cx="16" cy="11" r="6" fill="rgba(221,211,190,0.20)"/>
  <!-- Core glow -->
  <circle cx="16" cy="16" r="4.5" fill="rgba(221,211,190,0.40)"/>
  <!-- Solid core -->
  <circle cx="16" cy="16" r="2.8" fill="rgba(221,211,190,0.80)"/>
  <!-- Core highlight -->
  <circle cx="14.8" cy="14.6" r="1.1" fill="rgba(221,211,190,0.90)"/>
